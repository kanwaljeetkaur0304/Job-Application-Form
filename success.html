<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Job Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 50px 30px;
            max-width: 600px;
            text-align: center;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 50px;
            color: white;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 32px;
        }

        .message {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .details {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin: 25px 0;
            text-align: left;
        }

        .details p {
            margin: 10px 0;
            color: #333;
        }

        .label {
            font-weight: bold;
            color: #667eea;
        }

        .action-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
            margin-top: 20px;
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .success-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Payment Successful!</h1>
        <p class="message">Your application has been submitted successfully and your payment of $25.00 has been processed.</p>

        <div id="successDetails" class="details" style="display: none;">
            <p><span class="label">Application ID:</span> <span id="appId"></span></p>
            <p><span class="label">Status:</span> Submitted</p>
            <p><span class="label">Next Steps:</span> Check your email for confirmation and further instructions.</p>
        </div>

        <div id="loadingSpinner" class="loading">
            <div class="spinner"></div>
            <p>Processing your application...</p>
        </div>

        <div id="errorMessage" class="error" style="display: none;">
            <p id="errorText"></p>
        </div>

        <a href="/" class="action-button">Return to Form</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get session ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');

            if (!sessionId) {
                showError('No session found. Please try again.');
                return;
            }

            // Process the payment
            fetch('/api/process-payment-success', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ sessionId })
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('loadingSpinner').style.display = 'none';

                if (result.success) {
                    document.getElementById('appId').textContent = result.applicationId;
                    document.getElementById('successDetails').style.display = 'block';
                } else {
                    showError('Error: ' + result.message);
                }
            })
            .catch(error => {
                document.getElementById('loadingSpinner').style.display = 'none';
                showError('Error processing payment: ' + error.message);
            });

            function showError(message) {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('errorText').textContent = message;
            }
        });
    </script>
</body>
</html>
